name: Build Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-i686 g++-mingw-w64-i686

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2EZConfig-test-build
          path: |
            build/release/bin/2EZ.dll
            build/release/bin/2EZConfig.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: 2EZConfig-test-build
          path: bin

      - name: Package release
        run: |
          VERSION=$(date +%Y.%m.%d)
          mkdir -p release
          cp bin/build/release/bin/2EZ.dll release/
          cp bin/build/release/bin/2EZConfig.exe release/
          cd release && zip ../2EZConfig-V2-${VERSION}.zip *
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: 2EZConfig V2 ${{ env.VERSION }}
          files: 2EZConfig-V2-${{ env.VERSION }}.zip
          generate_release_notes: true
